name: Build and deploy Vani to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Pages
        uses: actions/configure-pages@v5

      - name: Check JavaScript
        run: npm run check

      - name: Check complete application module
        run: cat public/app-parts/part*.txt > /tmp/vani-app.mjs && node --check /tmp/vani-app.mjs

      - name: Generate male and female Mac reference recordings
        run: node scripts/generate-static-reference-audio.mjs

      - name: Disable Jekyll processing
        run: touch public/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
