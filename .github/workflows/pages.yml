name: Build and deploy Vani to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reconstruct Version 8 project
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import base64

          parts = sorted(Path('bootstrap').glob('vani-pages-min.tar.xz.b64.part*'))
          expected = [f'part{i:02d}' for i in range(8)]
          found = [p.name.rsplit('.', 1)[-1] for p in parts]
          if found != expected:
              raise SystemExit(f'Missing archive parts. Expected {expected}, found {found}')

          encoded = ''.join(p.read_text(encoding='utf-8').strip() for p in parts)
          Path('/tmp/vani-pages-min.tar.xz').write_bytes(base64.b64decode(encoded, validate=True))
          PY
          tar -xJf /tmp/vani-pages-min.tar.xz -C .

      - name: Set up Pages
        uses: actions/configure-pages@v5

      - name: Check JavaScript
        run: npm run check

      - name: Generate male and female Mac reference recordings
        run: node scripts/generate-static-reference-audio.mjs

      - name: Disable Jekyll processing
        run: touch public/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
