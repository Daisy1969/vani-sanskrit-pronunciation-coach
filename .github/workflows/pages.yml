name: Build and deploy Vani to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check application JavaScript
        run: npm run check

      - name: Check complete application module
        run: cat public/app-parts/part*.txt > /tmp/vani-app.mjs && node --check /tmp/vani-app.mjs

      - name: Generate male and female reference recordings
        run: npm run generate:references

      - name: Verify generated website
        shell: bash
        run: |
          test -f public/index.html
          test -f public/audio/natural/female/samasthiti.wav
          test -f public/audio/natural/male/samasthiti.wav

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
